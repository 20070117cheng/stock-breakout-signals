# ===== 大漲訊號系統設定 =====
# 門檻皆出自《大漲的訊號》，改動前請先理解書中理由

# --- 買進檢核門檻 ---
breakout_lookback_days: 490     # ① 突破近 2 年（約 490 個交易日）新高
long_term_growth: 0.07          # ③ 長期獲利年均成長 ≥7%
recent_growth: 0.20             # ④ 最近 1~2 年獲利成長 ≥20%
quarterly_revenue_growth: 0.10  # ⑤ 近 2~3 季營收年增 ≥10%
quarterly_profit_growth: 0.20   # ⑥ 近 2~3 季獲利年增 ≥20%
pe_limit: 60                    # ⑧ 本益比上限（書 p.153）

# --- 賣出門檻 ---
stop_loss_pct: 0.08             # 硬停損：跌破買價 8%（賣股公式4，p.227，可改 0.07~0.10）
stop_warn_pct: 0.07             # 提前警示：跌幅達 7% 且跌破近N日最低價即可先賣（p.228）
low_break_window: 20            # 上述「近N日最低價」的天數
spr_window: 20                  # 賣壓比例統計 20 個營業日（書 p.208）
spr_threshold: 1.17             # SPR ≥117% 出現賣出訊號（書建議 116~118%）

# --- 資金管理 ---
total_capital: 50000            # 你的總投資資產（用來算單檔 10% 上限），請自行修改

# --- 虛擬操盤（紙上交易）起始資金 ---
paper_capital_tw: 100000        # 台股虛擬帳戶（台幣）
paper_capital_us: 3000          # 美股虛擬帳戶（美元）

# --- 系統 ---
max_candidates_per_day: 25      # 每日最多細查幾檔候選（控制執行時間與 API 用量）
min_score_to_notify: 55         # 檢核分數達此值才寄 Email（儀表板仍顯示全部）
fundamental_pause_sec: 2        # 候選股間的 API 間隔秒數（禮貌限速）
dashboard_url: "https://20070117cheng.github.io/stock-breakout-signals/"

