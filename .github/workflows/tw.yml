name: 台股每日掃描

on:
  schedule:
    # 主要：UTC 08:37 = 台北 16:37（避開整半點壅塞時段，GitHub 較不會跳過）
    - cron: "37 8 * * 1-5"
    # 備援：UTC 09:52 = 台北 17:52（若主要時段被 GitHub 跳過則補跑；
    # 已處理過當日資料時會自動略過，不會重複）
    - cron: "52 9 * * 1-5"
    # 加開備援：台北 20:23 與隔日 07:41（分散時段，避開 Yahoo 對雲端主機的
    # 凌晨限流窗；成功過的當日資料會被防重保護自動略過）
    - cron: "23 12 * * 1-5"
    - cron: "41 23 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 還原價格快取
        uses: actions/cache@v4
        with:
          path: data/close_tw.parquet
          key: close-tw-${{ github.run_id }}
          restore-keys: close-tw-

      - name: 執行選股引擎
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m engine.run_daily --market tw

      - name: 更新儀表板與訊號記錄
        run: |
          git config user.name "signal-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/index.html data/state.json data/signals_log.json data/paper.json data/scorecards.json
          git diff --cached --quiet && exit 0 || git commit -m "台股掃描 $(date +%F)"
          n=0
          until git push; do
            n=$((n+1)); [ $n -ge 3 ] && exit 1
            # 有人同時推送：合併並以本次掃描產出為準（皆為自動生成檔）
            git pull --no-rebase -X ours --no-edit || { git merge --abort || true; git fetch origin; git reset --hard HEAD; }
          done
