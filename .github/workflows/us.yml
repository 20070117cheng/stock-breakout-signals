name: 美股每日掃描

on:
  schedule:
    # 主要：UTC 22:07 = 美東收盤後 = 台北隔天 06:07（避開整點壅塞時段）
    - cron: "7 22 * * 1-5"
    # 備援：UTC 23:22 = 台北隔天 07:22（主要時段被跳過則補跑，重複自動略過）
    - cron: "22 23 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 還原價格快取
        uses: actions/cache@v4
        with:
          path: data/close_us.parquet
          key: close-us-${{ github.run_id }}
          restore-keys: close-us-

      - name: 執行選股引擎
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m engine.run_daily --market us

      - name: 更新儀表板與訊號記錄
        run: |
          git config user.name "signal-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/index.html data/state.json data/signals_log.json data/paper.json data/scorecards.json
          git diff --cached --quiet && exit 0 || git commit -m "美股掃描 $(date +%F)"
          n=0
          until git push; do
            n=$((n+1)); [ $n -ge 3 ] && exit 1
            # 有人同時推送：合併並以本次掃描產出為準（皆為自動生成檔）
            git pull --no-rebase -X ours --no-edit || { git merge --abort || true; git fetch origin; git reset --hard HEAD; }
          done
